<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Topic Index — 11+ Prep</title>
  <style>
    :root{
      --blue:#1c4c96;--blue-light:#e8eef8;
      --green:#1a7a4a;--green-light:#e6f4ed;
      --amber:#b45309;--amber-light:#fef3c7;
      --purple:#6d28d9;--purple-light:#ede9fe;
      --red:#dc2626;--red-light:#fee2e2;
      --text:#1a1a2e;--muted:#64748b;
      --border:#e2e8f0;--bg:#f8fafc;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .topbar{background:var(--blue);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .topbar a{color:#fff;text-decoration:none;font-weight:bold}
    .hero{background:linear-gradient(135deg,var(--blue) 0%,#2563eb 100%);color:#fff;padding:28px 20px 24px;text-align:center}
    .hero h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
    .hero p{opacity:0.88;font-size:0.95rem}
    .search-wrap{max-width:500px;margin:16px auto 0;position:relative}
    .search-wrap input{width:100%;padding:10px 16px 10px 40px;border-radius:10px;border:none;font-size:0.95rem;outline:none}
    .search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.85rem}
    .main{max-width:900px;margin:0 auto;padding:24px 16px 60px}
    .tab-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .tab{border:2px solid var(--border);background:#fff;border-radius:10px;padding:8px 18px;font-size:0.88rem;cursor:pointer;color:var(--muted);font-weight:600;transition:all .15s}
    .tab.active.math{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
    .tab.active.eng{border-color:var(--green);color:var(--green);background:var(--green-light)}
    .tab.active.all{border-color:var(--purple);color:var(--purple);background:var(--purple-light)}
    .section{margin-bottom:32px}
    .section-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
    .section-title.math-lbl{color:var(--blue);border-color:var(--blue)}
    .section-title.eng-lbl{color:var(--green);border-color:var(--green)}
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
    .topic-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
    .topic-name{font-weight:700;font-size:0.93rem;margin-bottom:6px;color:var(--text)}
    .day-links{display:flex;gap:6px;flex-wrap:wrap}
    .day-link{background:var(--blue-light);color:var(--blue);border-radius:6px;padding:2px 9px;font-size:0.78rem;font-weight:700;text-decoration:none;transition:all .12s}
    .day-link:hover{background:var(--blue);color:#fff}
    .day-link.eng{background:var(--green-light);color:var(--green)}
    .day-link.eng:hover{background:var(--green);color:#fff}
    .no-results{text-align:center;color:var(--muted);padding:40px;font-size:0.95rem}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&#8592; All Days</a>
  <span>Topic Index</span>
</div>
<div class="hero">
  <h1>&#x1F4CB; Topic Index</h1>
  <p>Find every topic covered across the 28-day programme. Click a day number to go straight to that practice.</p>
  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="Search topics… e.g. Pythagoras, metaphor, fractions" oninput="filterTopics()"/>
  </div>
</div>

<div class="main">
  <div class="tab-bar">
    <button class="tab active all" onclick="setTab('all')">All Topics</button>
    <button class="tab math" onclick="setTab('math')">&#x1F4D0; Maths</button>
    <button class="tab eng" onclick="setTab('eng')">&#x1F4D6; English</button>
  </div>

  <!-- MATHS -->
  <div class="section" id="mathSection">
    <div class="section-title math-lbl">&#x1F4D0; Maths Topics</div>
    <div class="topic-grid" id="mathGrid"></div>
  </div>

  <!-- ENGLISH -->
  <div class="section" id="engSection">
    <div class="section-title eng-lbl">&#x1F4D6; English &amp; Literary Techniques</div>
    <div class="topic-grid" id="engGrid"></div>
  </div>

  <div class="no-results hidden" id="noResults">No topics match your search.</div>
</div>

var currentTab = 'all';

function dayLink(d, cls){
  var num = d < 10 ? '0' + d : '' + d;
  return '<a class="day-link ' + (cls||'') + '" href="days/day-' + num + '.html">Day ' + d + '</a>';
}

function renderGrid(topics, containerId, cls){
  var grid = document.getElementById(containerId);
  grid.innerHTML = '';
  topics.forEach(function(t){
    var card = document.createElement('div');
    card.className = 'topic-card';
    card.setAttribute('data-name', t.name.toLowerCase());
    card.innerHTML = '<div class="topic-name">' + t.name + '</div><div class="day-links">' + t.days.map(function(d){ return dayLink(d, cls); }).join('') + '</div>';
    grid.appendChild(card);
  });
}

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelector('.tab.' + (tab==='all'?'all':tab==='math'?'math':'eng')).classList.add('active');
  document.getElementById('mathSection').style.display = (tab==='eng') ? 'none' : 'block';
  document.getElementById('engSection').style.display = (tab==='math') ? 'none' : 'block';
}

function filterTopics(){
  var q = document.getElementById('searchBox').value.toLowerCase().trim();
  var anyVisible = false;
  document.querySelectorAll('.topic-card').forEach(function(card){
    var match = !q || card.getAttribute('data-name').includes(q);
    card.style.display = match ? '' : 'none';
    if(match) anyVisible = true;
  });
  document.getElementById('noResults').classList.toggle('hidden', anyVisible);
  if(q){
    document.getElementById('mathSection').style.display = 'block';
    document.getElementById('engSection').style.display = 'block';
  } else {
    setTab(currentTab);
  }
}

renderGrid(mathTopics, 'mathGrid', '');
renderGrid(engTopics, 'engGrid', 'eng');
</script>
</body>
</html>
